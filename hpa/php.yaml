apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-apache
  namespace: hpa
spec:
  selector:
    matchLabels:
      run: php-apache
  template:
    metadata:
    annotations:
      scaleops.sh/exclude-automation: "true"
    labels:
      run: php-apache
    spec:
      containers:
      - name: php-apache
        image: registry.k8s.io/hpa-example
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: 500m
          requests:
            cpu: 200m
            memory: 200Mi
---
apiVersion: v1
kind: Service
metadata:
  name: php-apache
  namespace: hpa
  labels:
    run: php-apache
spec:
  ports:
  - port: 80
  selector:
    run: php-apache
