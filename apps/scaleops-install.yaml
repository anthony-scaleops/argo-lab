apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scaleops-alt
  namespace: argocd
spec: 
  project: default
  source:
    repoURL: https://registry.scaleops.com/charts/
    targetRevision: 1.30.0
    helm:
      values: |-
        scaleopsToken: ***
        clusterName: scaleops-lab
        global:
          image:
            registry: registry.scaleops.com
    chart: scaleops
  destination:
    server: https://kubernetes.default.svc
    namespace: scaleops-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
    syncOptions:
      - CreateNamespace=true